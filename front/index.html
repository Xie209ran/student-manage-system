<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学数字平台后台管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <login-page v-if="currentPage === 'login'" @login-success="handleLoginSuccess"></login-page>
        
        <el-container v-else class="main-container">
            <el-aside width="220px" class="sidebar">
                <div class="logo">
                    <h2>教学管理平台</h2>
                </div>
                <el-menu
                    :default-active="currentMenu"
                    class="menu"
                    background-color="#304156"
                    text-color="#bfcbd9"
                    active-text-color="#409EFF"
                    :collapse-transition="false"
                    @select="handleMenuSelect"
                >
                    <el-menu-item index="dashboard">
                        <el-icon><HomeFilled /></el-icon>
                        <span>仪表盘</span>
                    </el-menu-item>
                    <el-menu-item index="student">
                        <el-icon><User /></el-icon>
                        <span>学生管理</span>
                    </el-menu-item>
                    <el-menu-item index="teacher">
                        <el-icon><UserFilled /></el-icon>
                        <span>教师管理</span>
                    </el-menu-item>
                    <el-menu-item index="class">
                        <el-icon><School /></el-icon>
                        <span>班级管理</span>
                    </el-menu-item>
                    <el-menu-item index="course">
                        <el-icon><Calendar /></el-icon>
                        <span>课程排课</span>
                    </el-menu-item>
                    <el-menu-item index="attendance">
                        <el-icon><Checked /></el-icon>
                        <span>考勤打卡</span>
                    </el-menu-item>
                    <el-menu-item index="score">
                        <el-icon><TrendCharts /></el-icon>
                        <span>成绩管理</span>
                    </el-menu-item>
                    <el-menu-item index="homework">
                        <el-icon><Document /></el-icon>
                        <span>作业管理</span>
                    </el-menu-item>
                </el-menu>
            </el-aside>
            
            <el-container>
                <el-header class="header">
                    <div class="header-left">
                        <span class="page-title">{{ pageTitle }}</span>
                    </div>
                    <div class="header-right">
                        <el-dropdown @command="handleCommand">
                            <span class="user-info">
                                <el-icon><Avatar /></el-icon>
                                {{ userInfo.realName || '管理员' }}
                                <el-icon class="el-icon--right"><ArrowDown /></el-icon>
                            </span>
                            <template #dropdown>
                                <el-dropdown-menu>
                                    <el-dropdown-item command="profile">个人信息</el-dropdown-item>
                                    <el-dropdown-item command="logout" divided>退出登录</el-dropdown-item>
                                </el-dropdown-menu>
                            </template>
                        </el-dropdown>
                    </div>
                </el-header>
                
                <el-main class="content">
                    <dashboard-page v-if="currentMenu === 'dashboard'"></dashboard-page>
                    <student-page v-if="currentMenu === 'student'"></student-page>
                    <teacher-page v-if="currentMenu === 'teacher'"></teacher-page>
                    <class-page v-if="currentMenu === 'class'"></class-page>
                    <course-page v-if="currentMenu === 'course'"></course-page>
                    <attendance-page v-if="currentMenu === 'attendance'"></attendance-page>
                    <score-page v-if="currentMenu === 'score'"></score-page>
                    <homework-page v-if="currentMenu === 'homework'"></homework-page>
                </el-main>
            </el-container>
        </el-container>
    </div>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <script src="https://unpkg.com/echarts/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <script src="js/http.js"></script>
    <script src="js/login.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/student.js"></script>
    <script src="js/teacher.js"></script>
    <script src="js/class.js"></script>
    <script src="js/course.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/score.js"></script>
    <script src="js/homework.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
