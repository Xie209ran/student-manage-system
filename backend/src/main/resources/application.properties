# 챈혵혥책혡징책혲짢챕혚혥챌쩍짰
server.port=8080

# MySQL챕혚혥챌쩍짰
spring.datasource.url=jdbc:mysql://localhost:3306/edum?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis챕혚혥챌쩍짰
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.edum.entity
mybatis.configuration.map-underscore-to-camel-case=true

# 챈혰짜책쩔혰챕혚혥챌쩍짰
logging.level.com.edum=debug
logging.level.org.springframework.web=info
