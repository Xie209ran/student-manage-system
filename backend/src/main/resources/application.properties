# server config
server.port=8080

# MySQL config
spring.datasource.url=jdbc:mysql://localhost:3306/edum?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis config
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.edum.entity
mybatis.configuration.map-underscore-to-camel-case=true

# logging
logging.level.com.edum=debug
logging.level.org.springframework.web=info

# Spring AI + Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5-coder:7b
